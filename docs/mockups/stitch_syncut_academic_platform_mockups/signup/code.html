<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SyncUT - Create Account</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Geist & Material Symbols -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed": "#bbf7d0",
                        "primary-fixed": "#ede9fe",
                        "surface-container-high": "#18181b",
                        "tertiary-fixed-dim": "#6ee7b7",
                        "tertiary-container": "#065f46",
                        "error-container": "#3b1111",
                        "on-secondary-fixed-variant": "#3f3f46",
                        "on-tertiary": "#001a12",
                        "on-surface": "#fafafa",
                        "outline-variant": "#27272a",
                        "surface": "#0c0c0f",
                        "on-secondary": "#09090b",
                        "outline": "#52525b",
                        "surface-dim": "#0c0c0f",
                        "secondary-fixed-dim": "#71717a",
                        "on-primary-container": "#ede9fe",
                        "error": "#ef4444",
                        "primary-fixed-dim": "#c4b5fd",
                        "on-tertiary-container": "#bbf7d0",
                        "surface-container-low": "#0f0f12",
                        "secondary-fixed": "#a1a1aa",
                        "primary-container": "#7c3aed",
                        "on-primary-fixed": "#2e1065",
                        "surface-tint": "#a78bfa",
                        "on-background": "#fafafa",
                        "surface-container-lowest": "#09090b",
                        "secondary": "#71717a",
                        "on-surface-variant": "#a1a1aa",
                        "primary": "#a78bfa",
                        "surface-bright": "#18181b",
                        "secondary-container": "#27272a",
                        "on-tertiary-fixed-variant": "#047857",
                        "background": "#09090b",
                        "surface-container": "#121215",
                        "surface-variant": "#18181b",
                        "inverse-primary": "#5b21b6",
                        "inverse-on-surface": "#09090b",
                        "inverse-surface": "#fafafa",
                        "on-tertiary-fixed": "#003318",
                        "on-secondary-container": "#a1a1aa",
                        "tertiary": "#34d399",
                        "on-primary-fixed-variant": "#5b21b6",
                        "surface-container-highest": "#1e1e22",
                        "on-primary": "#0a0012",
                        "on-error": "#1a0000",
                        "on-secondary-fixed": "#18181b",
                        "on-error-container": "#fca5a5"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Geist", "sans-serif"],
                        "display": ["Geist", "sans-serif"],
                        "body": ["Geist", "sans-serif"],
                        "label": ["Geist", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex items-center justify-center p-4 selection:bg-primary/30 selection:text-primary-fixed">
<!-- Main Container -->
<main class="w-full max-w-md">
<!-- Brand / Header -->
<div class="text-center mb-8">
<div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-surface-container border border-outline-variant mb-4 shadow-lg shadow-black/50">
<span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings: 'FILL' 1;">security</span>
</div>
<h1 class="font-headline text-2xl font-bold tracking-tight text-on-surface mb-2">Create an account</h1>
<p class="text-on-surface-variant text-sm">Join SyncUT to secure your digital identity.</p>
</div>
<!-- Form Card -->
<div class="bg-surface-container border border-outline-variant rounded-xl p-8 shadow-2xl shadow-black/80">
<form action="#" class="space-y-6" method="POST">
<!-- Full Name Field -->
<div>
<label class="block text-sm font-medium text-on-surface mb-2" for="name">Full Name</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-[20px]">person</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 bg-surface-container-low border border-outline-variant rounded-lg text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all sm:text-sm" id="name" name="name" placeholder="John Doe" required="" type="text"/>
</div>
</div>
<!-- Email Field -->
<div>
<label class="block text-sm font-medium text-on-surface mb-2" for="email">Email address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-[20px]">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 bg-surface-container-low border border-outline-variant rounded-lg text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all sm:text-sm" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Field with Strength Indicator -->
<div>
<label class="block text-sm font-medium text-on-surface mb-2" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-[20px]">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-2.5 bg-surface-container-low border border-outline-variant rounded-lg text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all sm:text-sm" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
<!-- Password Strength Meter -->
<div class="mt-3">
<div class="flex gap-1.5 h-1.5 w-full">
<div class="flex-1 rounded-full bg-tertiary transition-all duration-300"></div>
<div class="flex-1 rounded-full bg-tertiary transition-all duration-300"></div>
<div class="flex-1 rounded-full bg-tertiary transition-all duration-300"></div>
<div class="flex-1 rounded-full bg-surface-container-highest transition-all duration-300"></div>
</div>
<div class="flex justify-between items-center mt-1.5">
<span class="text-xs text-on-surface-variant">Must be at least 8 characters</span>
<span class="text-xs font-semibold text-tertiary tracking-wide uppercase">Strong</span>
</div>
</div>
</div>
<!-- Confirm Password Field -->
<div>
<label class="block text-sm font-medium text-on-surface mb-2" for="confirm_password">Confirm Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-[20px]">lock_reset</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 bg-surface-container-low border border-outline-variant rounded-lg text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all sm:text-sm" id="confirm_password" name="confirm_password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Terms and Conditions -->
<div class="flex items-start">
<div class="flex items-center h-5">
<input class="w-4 h-4 rounded bg-surface-container-low border-outline-variant text-primary focus:ring-primary focus:ring-offset-2 focus:ring-offset-background transition-colors cursor-pointer" id="terms" name="terms" required="" type="checkbox"/>
</div>
<div class="ml-3 text-sm">
<label class="font-medium text-on-surface-variant cursor-pointer" for="terms">
                            I agree to the <a class="text-primary hover:text-primary-fixed underline decoration-primary/30 underline-offset-2 transition-colors" href="#">Terms of Service</a> and <a class="text-primary hover:text-primary-fixed underline decoration-primary/30 underline-offset-2 transition-colors" href="#">Privacy Policy</a>.
                        </label>
</div>
</div>
<!-- Submit Button -->
<button class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-on-primary bg-primary hover:bg-primary-fixed focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-background focus:ring-primary transition-all active:scale-[0.98]" type="submit">
                    Create Account
                </button>
</form>
</div>
<!-- Footer Link -->
<p class="mt-8 text-center text-sm text-on-surface-variant">
            Already have an account?
            <a class="font-medium text-primary hover:text-primary-fixed transition-colors" href="#">Sign in to SyncUT</a>
</p>
</main>
</body></html>
